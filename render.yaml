# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard → New → Blueprint → select this repo.
services:
  - type: web
    name: vynt-feed-manager
    runtime: python
    region: frankfurt # closest Render region to Lagos
    # Free tier: the instance spins down when idle, so the daily sync is
    # driven by an external cron (cron-job.org) that pings /health to wake it
    # and then POSTs /sync — see README. If you upgrade to `starter` (always
    # on), the in-process scheduler handles 02:00 WAT by itself and no
    # external cron is needed. Either way keep it at 1 instance / 1 worker.
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn vynt_to_meta:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: VYNT_AUTH_TOKEN
        sync: false # prompted for in the Render dashboard; never committed
      - key: FACEBOOK_ACCESS_TOKEN
        sync: false
      - key: CATALOG_ID
        sync: false
      # TikTok is optional — leave these blank to sync Facebook only.
      # (TikTok ingests the feed this service exposes at /feed.csv, using the
      # public URL Render provides via RENDER_EXTERNAL_URL.)
      - key: TIKTOK_ACCESS_TOKEN
        sync: false
      - key: TIKTOK_BC_ID
        sync: false
      - key: TIKTOK_CATALOG_ID
        sync: false
      - key: BASE_PRODUCT_URL
        value: https://vynt.com/products/
    # Optional: keep sync history across deploys/restarts by attaching a disk
    # and pointing DATA_DIR at it (uncomment both blocks):
    # disk:
    #   name: vynt-data
    #   mountPath: /data
    #   sizeGB: 1
    # (then add)  - key: DATA_DIR
    #             value: /data
